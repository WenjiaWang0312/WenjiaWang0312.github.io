name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JEKYLL_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          repo = "open-mmlab/mmhuman3d"
          stats_path = Path("_data/github_stats.yml")
          old_content = stats_path.read_text()
          old_stars_match = re.search(r"^\s+stars:\s+(\d+)\s*$", old_content, re.MULTILINE)
          old_stars = int(old_stars_match.group(1)) if old_stars_match else None

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:
              data = json.load(response)

          stars = int(data["stargazers_count"])
          if stars == old_stars:
              raise SystemExit

          updated_at = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          stats_path.write_text(
              f"mmhuman3d:\n"
              f"  repo: {repo}\n"
              f"  stars: {stars}\n"
              f"  updated_at: \"{updated_at}\"\n"
          )
          PY

          if git diff --quiet -- _data/github_stats.yml; then
            echo "No GitHub stats changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/github_stats.yml
          git commit -m "Update GitHub stats"
          git push

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: bundle exec jekyll build --destination ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
